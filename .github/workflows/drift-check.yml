# Drift Check — weekly job that compares the vendored ALZ policy against
# the latest commit on the Azure/Enterprise-Scale main branch.
#
# When a newer version is detected, a GitHub Issue is opened automatically
# so maintainers can review and update the vendored JSON.
#
# Trigger: every Monday at 08:00 UTC, and manually via workflow_dispatch.

name: ALZ Policy Drift Check

on:
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC
  workflow_dispatch: # allow manual trigger at any time

permissions:
  contents: read
  issues: write # to open a drift-alert issue

jobs:
  drift-check:
    name: Check ALZ policy version drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      - name: Fetch latest ALZ version
        id: check
        run: |
          VENDORED_VERSION=$(jq -r '.properties.metadata.version' \
            policy_definitions/Deploy-Private-DNS-Generic.2026-04-29.json)

          MAIN_URL="https://raw.githubusercontent.com/Azure/Enterprise-Scale/main/src/resources/Microsoft.Authorization/policyDefinitions/Deploy-Private-DNS-Generic.json"
          MAIN_TMP=$(mktemp)
          curl -fsSL "$MAIN_URL" -o "$MAIN_TMP"
          MAIN_VERSION=$(jq -r '.properties.metadata.version' "$MAIN_TMP")

          VENDORED_HASH=$(jq -S . policy_definitions/Deploy-Private-DNS-Generic.2026-04-29.json | sha256sum | awk '{print $1}')
          MAIN_HASH=$(jq -S . "$MAIN_TMP" | sha256sum | awk '{print $1}')

          echo "vendored_version=${VENDORED_VERSION}" >> "$GITHUB_OUTPUT"
          echo "main_version=${MAIN_VERSION}"         >> "$GITHUB_OUTPUT"
          echo "vendored_hash=${VENDORED_HASH}"       >> "$GITHUB_OUTPUT"
          echo "main_hash=${MAIN_HASH}"               >> "$GITHUB_OUTPUT"

          # Simple semver-style comparison using sort -V
          NEWER=$(printf '%s\n%s\n' "$VENDORED_VERSION" "$MAIN_VERSION" \
            | sort -V | tail -n1)

          HAS_VERSION_DRIFT=false
          HAS_CONTENT_DRIFT=false

          if [ "$NEWER" != "$VENDORED_VERSION" ]; then
            HAS_VERSION_DRIFT=true
          fi

          if [ "$VENDORED_HASH" != "$MAIN_HASH" ]; then
            HAS_CONTENT_DRIFT=true
          fi

          if [ "$HAS_VERSION_DRIFT" = true ] || [ "$HAS_CONTENT_DRIFT" = true ]; then
            echo "has_drift=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
          fi

          echo "has_version_drift=${HAS_VERSION_DRIFT}" >> "$GITHUB_OUTPUT"
          echo "has_content_drift=${HAS_CONTENT_DRIFT}" >> "$GITHUB_OUTPUT"

          if [ "$HAS_VERSION_DRIFT" = true ] && [ "$HAS_CONTENT_DRIFT" = true ]; then
            echo "drift_reason=version-and-content" >> "$GITHUB_OUTPUT"
          elif [ "$HAS_VERSION_DRIFT" = true ]; then
            echo "drift_reason=version" >> "$GITHUB_OUTPUT"
          elif [ "$HAS_CONTENT_DRIFT" = true ]; then
            echo "drift_reason=content" >> "$GITHUB_OUTPUT"
          else
            echo "drift_reason=none" >> "$GITHUB_OUTPUT"
          fi

          rm -f "$MAIN_TMP"

      - name: Log result
        run: |
          echo "Vendored version : ${{ steps.check.outputs.vendored_version }}"
          echo "Upstream version : ${{ steps.check.outputs.main_version }}"
          echo "Vendored hash    : ${{ steps.check.outputs.vendored_hash }}"
          echo "Upstream hash    : ${{ steps.check.outputs.main_hash }}"
          echo "Version drift    : ${{ steps.check.outputs.has_version_drift }}"
          echo "Content drift    : ${{ steps.check.outputs.has_content_drift }}"
          echo "Reason           : ${{ steps.check.outputs.drift_reason }}"
          echo "Drift detected   : ${{ steps.check.outputs.has_drift }}"

      # Only open an issue when drift is detected and no open issue already exists
      - name: Open drift-alert issue
        if: steps.check.outputs.has_drift == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const reason = '${{ steps.check.outputs.drift_reason }}';
            const title = reason === 'content'
              ? `ALZ Policy drift detected: content differs (v${{ steps.check.outputs.main_version }})`
              : `ALZ Policy drift detected: upstream v${{ steps.check.outputs.main_version }} > vendored v${{ steps.check.outputs.vendored_version }}`;

            // Check if an issue with the same title is already open
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'alz-drift',
            });

            const duplicate = issues.data.find(i => i.title === title);
            if (duplicate) {
              core.notice(`Drift issue already open: ${duplicate.html_url}`);
              return;
            }

            const summary = reason === 'content'
              ? `The upstream [Azure/Enterprise-Scale](https://github.com/Azure/Enterprise-Scale) repository has different canonical JSON content for \`Deploy-Private-DNS-Generic.json\` on \`main\` (after normalization).`
              : `The upstream [Azure/Enterprise-Scale](https://github.com/Azure/Enterprise-Scale) repository has a newer version of \`Deploy-Private-DNS-Generic.json\` on \`main\`.`;

            const body = [
              `## ALZ Policy Drift Detected`,
              ``,
              `| | Version |`,
              `|---|---|`,
              `| **Vendored** (current) | \`${{ steps.check.outputs.vendored_version }}\` |`,
              `| **Upstream main** | \`${{ steps.check.outputs.main_version }}\` |`,
              ``,
              `| | SHA256 (canonical JSON) |`,
              `|---|---|`,
              `| **Vendored** (current) | \`${{ steps.check.outputs.vendored_hash }}\` |`,
              `| **Upstream main** | \`${{ steps.check.outputs.main_hash }}\` |`,
              ``,
              `Detected reason: **${{ steps.check.outputs.drift_reason }}**`,
              ``,
              summary,
              ``,
              `### Action required`,
              `1. Review the upstream diff: [Deploy-Private-DNS-Generic.json](https://github.com/Azure/Enterprise-Scale/commits/main/src/resources/Microsoft.Authorization/policyDefinitions/Deploy-Private-DNS-Generic.json)`,
              `2. Download the new version and update \`policy_definitions/Deploy-Private-DNS-Generic.<date>.json\``,
              `3. Run \`terraform test\` and open a PR`,
              ``,
              `> This issue was opened automatically by the weekly drift-check workflow.`,
            ].join('\n');

            const result = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['alz-drift', 'policy'],
            });

            core.notice(`Drift issue created: ${result.data.html_url}`);
