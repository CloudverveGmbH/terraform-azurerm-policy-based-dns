# Release — triggered by pushing a semantic version tag (e.g. v1.0.0).
#
# HOW THE TERRAFORM REGISTRY WORKS:
#   The public Terraform Registry (registry.terraform.io) is a PULL model.
#   When a matching tag is pushed, this workflow:
#     1. Re-runs the full test suite as a final gate.
#     2. Creates a GitHub Release with release notes.
#   The Registry then polls the GitHub release via the webhook that was
#   configured once in: https://registry.terraform.io/ → "Publish Module".
#   No registry token or `terraform publish` CLI command is required.
#
# PREREQUISITE (one-time, manual):
#   1. Rename repo to terraform-azurerm-private-dns-policy (Registry naming rule)
#   2. Go to https://registry.terraform.io → Sign in with GitHub
#   3. Publish → Modules → select the repo → webhook is created automatically
#
# PERMISSIONS:
#   `contents: write` is required only to create the GitHub Release.
#   This workflow is triggered only by maintainers who can push tags.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*" # pre-releases: v1.1.0-beta.1

permissions:
  contents: write # to create GitHub Releases

env:
  TF_VERSION: "1.11.4"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  # ── 1. Tests must pass before any release is published ────────────────────────
  test:
    name: Tests (release gate)
    runs-on: ubuntu-latest
    # Read-only during test phase
    permissions:
      contents: read
    steps:
      - name: Checkout ${{ github.ref_name }}
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@6231c69db2939d0201e3a32ba5d412196c077100 # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (no backend)
        run: terraform -chdir=examples/ci-validate init -backend=false

      - name: Validate format
        run: terraform fmt -check -recursive -diff

      - name: Terraform validate
        run: terraform -chdir=examples/ci-validate validate

      - name: Run Terraform tests
        run: terraform test -verbose

  # ── 2. Update CHANGELOG.md on main + create GitHub Release ───────────────────
  #
  # BRANCH PROTECTION NOTE:
  #   This job commits CHANGELOG.md directly to main. For this to work, the
  #   GitHub Actions bot must be allowed to bypass branch protection:
  #   Settings → Branches → main → "Allow specified actors to bypass required
  #   pull request reviews" → add "github-actions[bot]".
  #   Alternatively, supply a PAT via secrets.CHANGELOG_PAT and set:
  #     token: ${{ secrets.CHANGELOG_PAT }}
  #   in the checkout step below.
  publish:
    name: Changelog + GitHub Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      # Checkout main (not the tag) so we can push CHANGELOG.md back.
      # The tag was just created on the HEAD of main by auto-tag.yml, so
      # checking out main gives us the exact same tree.
      - name: Checkout main (full history)
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2
        with:
          fetch-depth: 0
          ref: main

      - name: Generate CHANGELOG.md with git-cliff
        id: cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: .github/cliff.toml
          args: --verbose --tag ${{ github.ref_name }}
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit CHANGELOG.md to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No CHANGELOG changes to commit."
          else
            git commit -m "chore: update CHANGELOG.md for ${{ github.ref_name }}"
            git push origin main
          fi

      - name: Extract vendored policy version
        id: policy_version
        run: |
          VERSION=$(jq -r '.properties.metadata.version' \
            policy_definitions/Deploy-Private-DNS-Generic.2026-04-29.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          # body_path writes the cliff-generated release section as the release body.
          # This is the content between the current and previous tag.
          body: |
            ${{ steps.cliff.outputs.content }}

            ---

            ### Vendored ALZ Policy
            | Property | Value |
            |---|---|
            | Version | `${{ steps.policy_version.outputs.version }}` |
            | Source tag | `2026-04-29` (Azure/Enterprise-Scale) |
            | SHA256 | `a2e3805c1129b5d540f38fbfe9f3c0608926c64526023a22fdaac7b81b22287a` |

            ### Usage
            ```hcl
            module "private_dns_policy" {
              source  = "CloudverveGmbH/private-dns-policy/azurerm"
              version = "${{ github.ref_name }}"

              location                 = "germanywestcentral"
              dns_resource_group_name  = "rg-connectivity-dns"
              enabled_categories       = { Storage = true, Databases = true }
              policy_assignment_scope_ids = {
                connectivity = "/subscriptions/<id>"
              }

              providers = {
                azurerm              = azurerm
                azurerm.connectivity = azurerm.connectivity
              }
            }
            ```

            ### Requirements
            - Terraform `>= 1.9`
            - AzureRM provider `>= 3.116`
            - Two `azurerm` provider aliases (default + `azurerm.connectivity`)
