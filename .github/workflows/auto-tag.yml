# Auto Tag — creates and pushes a new semver tag on every push to main.
#
# VERSION BUMP RULES (checked in order):
#   1. Commit message / PR title contains [major]  → bump MAJOR, reset minor + patch to 0
#   2. Commit message / PR title contains [minor]  → bump MINOR, reset patch to 0
#   3. Everything else                             → bump PATCH only
#
# OVERRIDING MAJOR/MINOR MANUALLY:
#   Trigger the workflow via "Run workflow" in the Actions UI and supply the
#   optional `force_version` input (e.g. "2.1.0"). Use this when you want to
#   jump to a specific version without relying on commit-message conventions.
#
# EXAMPLE COMMIT MESSAGES:
#   "Add CosmosDB Mongo vCore service key [minor]"  → v1.1.0
#   "Rename variable dns_rg [major]"                → v2.0.0
#   "Fix typo in README"                            → v1.0.1  (default)
#
# SECURITY:
#   The workflow runs only on commits that landed on main (post-merge).
#   It has `contents: write` to push the tag and nothing else.
#   No secrets beyond GITHUB_TOKEN are required.

name: Auto Tag

on:
  push:
    branches:
      - main
    paths:
      # Only tag when module files actually changed – ignore docs-only pushes.
      - "**.tf"
      - "**.tftest.hcl"
      - "policy_definitions/**"
  workflow_dispatch:
    inputs:
      force_version:
        description: "Force a specific version (e.g. 2.1.0). Leave blank to use bump logic."
        required: false
        default: ""
      bump:
        description: "Bump level when force_version is blank."
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write # needed to push the new tag

jobs:
  bump-tag:
    name: Bump and push semver tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with full tag history)
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2
        with:
          fetch-depth: 0 # required to see existing tags

      - name: Determine next version
        id: version
        run: |
          set -euo pipefail

          # ── Resolve current latest tag ────────────────────────────────────
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
            | sort -V | tail -n1)

          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
            echo "No existing tags found, starting from v0.0.0"
          else
            echo "Latest tag: ${LATEST}"
          fi

          MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f3)

          # ── Forced version (workflow_dispatch only) ───────────────────────
          FORCE="${{ github.event.inputs.force_version }}"
          if [ -n "$FORCE" ]; then
            # Strip leading v if provided
            NEXT_VERSION="v$(echo "$FORCE" | sed 's/^v//')"
            echo "Forced version: ${NEXT_VERSION}"
            echo "next_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Determine bump level ──────────────────────────────────────────
          # Check commit message for [major] / [minor] markers.
          # For push events, inspect the HEAD commit message.
          # For workflow_dispatch, use the dropdown input.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ github.event.inputs.bump }}"
          else
            COMMIT_MSG=$(git log -1 --pretty=%B)
            echo "Commit message: ${COMMIT_MSG}"

            if echo "$COMMIT_MSG" | grep -qi '\[major\]'; then
              BUMP="major"
            elif echo "$COMMIT_MSG" | grep -qi '\[minor\]'; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
          fi

          echo "Bump level: ${BUMP}"

          # ── Calculate next version ────────────────────────────────────────
          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: ${NEXT_VERSION}"
          echo "next_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Confirm version to be tagged
        run: echo "Tagging commit ${{ github.sha }} as ${{ steps.version.outputs.next_version }}"

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.next_version }}" \
            -m "Release ${{ steps.version.outputs.next_version }}"
          git push origin "${{ steps.version.outputs.next_version }}"

      - name: Summary
        run: |
          echo "### 🏷️ Tagged \`${{ steps.version.outputs.next_version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The \`release.yml\` workflow will now pick this up, run tests, and publish the GitHub Release." >> "$GITHUB_STEP_SUMMARY"
