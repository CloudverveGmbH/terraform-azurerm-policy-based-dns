# CI — runs on every pull request targeting main.
#   • Actions are pinned to exact SHAs to prevent supply-chain attacks.
#     Dependabot will keep these up to date automatically.

name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "**.tf"
      - "**.tftest.hcl"
      - "policy_definitions/**"
      - ".github/workflows/ci.yml"

# Minimal permissions – this workflow never writes to the repo.
permissions:
  contents: read
  pull-requests: write # needed only for the PR annotation/comment on failure

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.11.4"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  # ── 1. Format & Validate ─────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269ef032 # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform format check
        run: terraform fmt -check -recursive -diff

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  # ── 2. Native test suite ──────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269ef032 # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Run Terraform tests
        run: terraform test -verbose

      - name: Annotate PR on failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "❌ **Terraform tests failed.** Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
            });
