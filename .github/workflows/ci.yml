# CI — runs on every pull request targeting main.
#   • Actions are pinned to exact SHAs to prevent supply-chain attacks.
#     Dependabot will keep these up to date automatically.

name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "**.tf"
      - "**.tftest.hcl"
      - "policy_definitions/**"
      - ".github/workflows/ci.yml"

# Minimal permissions – this workflow never writes to the repo.
permissions:
  contents: read
  pull-requests: write # needed only for the PR annotation/comment on failure

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.11.4"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  # ── 1. Format & Validate ─────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@6231c69db2939d0201e3a32ba5d412196c077100 # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform format check
        run: terraform fmt -check -recursive -diff

      - name: Terraform init (no backend)
        run: terraform -chdir=examples/ci-validate init -backend=false

      - name: Terraform validate
        run: terraform -chdir=examples/ci-validate validate

  # ── 2. Native test suite ──────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@6231c69db2939d0201e3a32ba5d412196c077100 # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Run Terraform tests
        run: terraform test -verbose

      - name: Annotate PR on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "❌ **Terraform tests failed.** Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
            });
