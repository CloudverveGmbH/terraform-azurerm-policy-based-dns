# git-cliff configuration for terraform-azurerm-private-dns-policy
#
# COMMIT CONVENTION (optional markers in commit message or PR title):
#
#   [breaking] or [major]  →  ⚠️ Breaking Changes
#   [minor]  or feat:      →  🚀 Features
#   [fix]    or fix:       →  🐛 Bug Fixes
#   [catalog]              →  📋 Service Catalog
#   [policy]               →  🔒 Policy
#   [test]   or test:      →  🧪 Tests
#   [docs]   or docs:      →  📚 Documentation
#   [ci]     or ci:        →  ⚙️ CI / Workflows
#   chore:, bump, release  →  skipped (not shown in changelog)
#   (anything else)        →  🔨 Other Changes
#
# None of these markers are required. Unlabelled commits land in "Other Changes".

[changelog]
header = """# Changelog

All notable changes to this module are documented in this file.
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\
### {{ group | upper_first }}

{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.github.username %} \
([{{ commit.github.username }}](https://github.com/{{ commit.github.username }}))\
{% endif %}
{% endfor %}
{% endfor %}\n
"""

footer = """
{% for release in releases -%}
{% if release.version -%}
{% if release.previous.version -%}
[{{ release.version | trim_start_matches(pat="v") }}]: \
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/compare/\
{{ release.previous.version }}...{{ release.version }}
{% endif -%}
{% else -%}
[unreleased]: \
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/compare/\
{{ release.previous.version }}...HEAD
{% endif -%}
{% endfor %}
"""

trim = true

[git]
# We do NOT require Conventional Commits. All commit formats are accepted.
conventional_commits = false
filter_unconventional = false
split_commits = false

commit_parsers = [
  # Skip pure maintenance / auto-bump commits
  { message = "^chore(release)|^chore: update CHANGELOG|^bump version|^release v", skip = true },

  # Explicit severity markers (commit message or PR title)
  { message = "\\[breaking\\]|\\[major\\]", group = "⚠️ Breaking Changes" },
  { message = "\\[minor\\]",               group = "🚀 Features" },

  # Common Conventional Commits prefixes (accepted but not required)
  { message = "^feat|\\[feat\\]",  group = "🚀 Features" },
  { message = "^fix|\\[fix\\]",   group = "🐛 Bug Fixes" },
  { message = "^docs|\\[docs\\]", group = "📚 Documentation" },
  { message = "^test|\\[test\\]", group = "🧪 Tests" },
  { message = "^ci|\\[ci\\]",     group = "⚙️ CI / Workflows" },
  { message = "^refactor",        group = "🔨 Other Changes" },
  { message = "^perf",            group = "⚡ Performance" },

  # Module-specific markers
  { message = "\\[catalog\\]",    group = "📋 Service Catalog" },
  { message = "\\[policy\\]",     group = "🔒 Policy" },

  # Catch-all — unlabelled commits still appear
  { message = ".*", group = "🔨 Other Changes" },
]

# Show full commit history (not just since last tag) for the first release
protect_breaking_commits = false
filter_commits = false

# Tag pattern — matches our auto-tag format
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
skip_tags = ""
ignore_tags = ".*-rc.*|.*-alpha.*|.*-beta.*"

topo_order = false
sort_commits = "newest"

[remote.github]
owner = "CloudverveGmbH"
repo  = "terraform-azurerm-private-dns-policy"
